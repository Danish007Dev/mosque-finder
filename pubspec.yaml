name: mosque_finder
description: "Smart Mosque Finder - Discover nearby mosques with maps, favorites, and multilingual support."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.12.0
  google_maps_flutter_android: ^2.16.0
  google_maps_flutter_platform_interface: ^2.10.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  url_launcher: ^6.3.1

  # Networking
  http: ^1.3.0
  connectivity_plus: ^6.1.4
  dio: ^5.7.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Utilities
  equatable: ^2.0.7
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1

  # Authentication
  jwt_decoder: ^2.0.1
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mockito: ^5.4.6
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/
    - assets/.env


